<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History - DIKZ AI</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/theme.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
</head>
<body>
  <div id="app" class="history-page">
    <div class="history-container">
      <div class="history-header">
        <h1>📜 History Chat</h1>
        <div class="history-search">
          <input type="text" id="searchInput" placeholder="Cari chat..." onkeyup="searchChat(event)">
        </div>
      </div>

      <div id="historyList" class="history-list">
        <!-- History items rendered here -->
      </div>

      <div class="history-actions">
        <button onclick="exportAllChats()" class="btn-secondary">📤 Export All</button>
        <button onclick="importChats()" class="btn-secondary">📥 Import</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/history.js"></script>
</body>
</html>
