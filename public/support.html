<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - DIKZ AI</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/theme.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
</head>
<body>
  <div id="app" class="support-page">
    <div class="support-container">
      <h1>🆘 Support</h1>
      <p>Hubungi kami melalui platform berikut:</p>

      <div class="support-grid">
        <a href="https://discord.gg/dikz-ai" target="_blank" class="support-card discord">
          <div class="support-icon">💬</div>
          <div class="support-name">Discord</div>
          <div class="support-desc">Gabung komunitas</div>
        </a>

        <a href="https://t.me/dikz_ai" target="_blank" class="support-card telegram">
          <div class="support-icon">✈️</div>
          <div class="support-name">Telegram</div>
          <div class="support-desc">Chat langsung</div>
        </a>

        <a href="https://github.com/dikz-ai" target="_blank" class="support-card github">
          <div class="support-icon">🐙</div>
          <div class="support-name">GitHub</div>
          <div class="support-desc">Lihat source code</div>
        </a>

        <a href="mailto:support@dikz.ai" class="support-card email">
          <div class="support-icon">📧</div>
          <div class="support-name">Email</div>
          <div class="support-desc">support@dikz.ai</div>
        </a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
